 <div class="p-2">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Financial Assets</h2>
        <span *ngIf="saving()" class="text-sm text-blue-500">Saving...</span>
        <span *ngIf="saveError()" class="text-sm text-red-500">{{ saveError() }}</span>
      </div>

      <!-- Skeleton loader — shows instantly, same height as grid -->
      <div
        *ngIf="loading()"
        style="width:100%;height:600px;display:flex;align-items:center;
               justify-content:center;background:var(--ag-background-color,#fff);
               border:1px solid #dde2eb;border-radius:4px"
      >
        <span style="color:#6b7280;font-size:14px">Loading assets…</span>
      </div>

      <div *ngIf="error()" class="p-4 text-red-500">{{ error() }}</div>

      <ag-grid-angular
        *ngIf="!loading() && !error()"
        class="ag-theme-alpine"
        style="width: 100%; height: 600px;"
        [rowData]="rowData()"
        [columnDefs]="colDefs()"
        [defaultColDef]="defaultColDef"
        [getRowId]="getRowId"
        (gridReady)="onGridReady($event)"
        (cellValueChanged)="onCellValueChanged($event)"
        [getRowClass]="getRowClass"
      />
     </div>
